<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>DexDel EOD Reporter</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        textarea {

            width: 100%;
            height: 300px;
            padding: 15px;
            font-size: 15px;

        }

        button {

            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;

        }

        #status {

            margin-top: 20px;
            font-weight: bold;

        }
    </style>

</head>

<body>

    <h2>DexDel EOD Reporter</h2>

    <textarea id="report" placeholder="Paste ChatGPT EOD Report Here"></textarea>

    <br>

    <button onclick="send()">Send To Google Sheet</button>

    <div id="status"></div>

    <script>

        const SPREADSHEET_ID = "1ORvWlu4bHYOi-UR51puZMrShl8XnYr6TmJLxQ_GilDU";
        const SHEET_NAME = "EOD Report";

        function doPost(e) {

            try {

                const data = JSON.parse(e.postData.contents);

                appendEOD(data);

                return ContentService
                    .createTextOutput(JSON.stringify({
                        success: true,
                        message: "EOD Added Successfully"
                    }))
                    .setMimeType(ContentService.MimeType.JSON);

            } catch (err) {

                return ContentService
                    .createTextOutput(JSON.stringify({
                        success: false,
                        message: err.toString()
                    }))
                    .setMimeType(ContentService.MimeType.JSON);

            }

        }

        function appendEOD(data) {

            const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
            const sheet = ss.getSheetByName(SHEET_NAME);

            let row = sheet.getLastRow() + 1;

            data.projects.forEach(function (project, index) {

                sheet.getRange(row, 1).setValue(index == 0 ? data.date : "");
                sheet.getRange(row, 2).setValue(project.project);
                sheet.getRange(row, 3).setValue(project.report);

                row++;

            });

        }

        function doGet() {
            return ContentService
                .createTextOutput("EOD API Running")
                .setMimeType(ContentService.MimeType.TEXT);
        }

    </script>

</body>

</html>
