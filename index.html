

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>DexDel EOD Reporter</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        textarea {

            width: 100%;
            height: 300px;
            padding: 15px;
            font-size: 15px;

        }

        button {

            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;

        }

        #status {

            margin-top: 20px;
            font-weight: bold;

        }
    </style>

</head>

<body>

    <h2>DexDel EOD Reporter</h2>

    <textarea id="report" placeholder="Paste ChatGPT EOD Report Here"></textarea>

    <br>

    <button onclick="send()">Send To Google Sheet</button>

    <div id="status"></div>

    <script>

        const WEBAPP = "https://script.google.com/macros/s/AKfycbwNOtwqncfVEqmdEfKQP_9Dx3ijAdeXof9j5JiD-ajOtHRbhWFjMJkiCH5r70FZf4OuVA/exec";

        function send() {

            let report = document.getElementById("report").value.trim();

            if (report == "") {
                alert("Please paste EOD report.");
                return;
            }

            let data = parseReport(report);

            fetch(WEBAPP, {
                method: "POST",
                body: JSON.stringify(data)
            })
                .then(r => r.json())
                .then(res => {

                    document.getElementById("status").innerHTML = "✅ " + res.message;

                    document.getElementById("report").value = "";

                })
                .catch(err => {

                    document.getElementById("status").innerHTML = "❌ " + err;

                });

        }


        function parseReport(text) {

            const lines = text.split("\n").map(x => x.trim());

            let date = "";
            let projects = [];

            let current = null;

            for (let i = 0; i < lines.length; i++) {

                let line = lines[i];

                if (line.startsWith("Date")) {
                    date = line.split("=")[1].trim();
                }

                if (line.startsWith("Project Name")) {

                    if (current) {
                        projects.push(current);
                    }

                    current = {
                        project: line.split("-")[1].trim(),
                        report: ""
                    };

                    continue;

                }

                if (current) {

                    if (line.startsWith("Time Estimate")) {
                        current.report += "Time Estimate: " + line.split("-")[1].trim() + "\n";
                        continue;
                    }
                    
                    if (line.startsWith("Task Assigned")) {
                        current.report += "Task Assigned: " + line.split("-")[1].trim() + "\n\n";
                        continue;
                    }
                    
                    if (line == "") {
                        continue;
                    }

                    current.report += line + "\n";

                }

            }

            if (current) {
                projects.push(current);
            }

            return {
                date: date,
                projects: projects
            };

        }

    </script>

</body>

</html>
