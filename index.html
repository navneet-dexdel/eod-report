<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexDel EOD Reporter</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        h2 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            font-size: 15px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>DexDel EOD Reporter</h2>

    <textarea id="report" placeholder="Paste ChatGPT EOD Report Here"></textarea>

    <br>

    <button onclick="send()">Send To Google Sheet</button>

    <div id="status"></div>

</div>

<script>

const WEBAPP = "https://script.google.com/macros/s/AKfycbwNOtwqncfVEqmdEfKQP_9Dx3ijAdeXof9j5JiD-ajOtHRbhWFjMJkiCH5r70FZf4OuVA/exec";

function send(){

    const report=document.getElementById("report").value.trim();

    if(report===""){
        alert("Please paste EOD report.");
        return;
    }

    const data=parseReport(report);

    fetch(WEBAPP,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(res=>{

        document.getElementById("status").innerHTML="✅ "+res.message;
        document.getElementById("report").value="";

    })
    .catch(err=>{

        document.getElementById("status").innerHTML="❌ "+err;

    });

}

function parseReport(text){

    const lines=text.split(/\r?\n/).map(x=>x.trim());

    let date="";
    let projects=[];
    let current=null;

    for(const line of lines){

        if(line==="") continue;

        if(line.startsWith("Date")){
            date=line.split("=")[1].trim();
            continue;
        }

        if(line.startsWith("Project Name")){

            if(current){
                current.report=current.report.trim();
                projects.push(current);
            }

            current={
                project:line.substring(line.indexOf("-")+1).trim(),
                time:"",
                assigned:"",
                report:""
            };

            continue;

        }

        if(!current) continue;

        if(line.startsWith("Time Estimate")){

            current.time=line.substring(line.indexOf("-")+1).trim();
            continue;

        }

        if(line.startsWith("Task Assigned")){

            current.assigned=line.substring(line.indexOf("-")+1).trim();
            continue;

        }

        current.report+=line+"\n";

    }

    if(current){
        current.report=current.report.trim();
        projects.push(current);
    }

    return{
        date:date,
        projects:projects
    };

}

</script>

</body>
</html>
